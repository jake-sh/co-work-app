<!DOCTYPE html>
<html lang="ko" data-theme="dark" data-lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CoWork</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoWork">
<meta name="theme-color" content="#0A0A0A">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/auth.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase SDK (compat 버전) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Firebase 설정 — 이 파일만 수정하면 됩니다 -->
<script src="js/firebase-config.js"></script>
</head>
<body>

<!-- SPLASH -->
<div id="app-loading" class="splash">
  <div class="splash-logo">
    <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
      <rect width="40" height="40" rx="12" fill="var(--card)"/>
      <rect x="8" y="8" width="10" height="10" rx="2.5" fill="var(--lime)"/>
      <rect x="22" y="8" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".6"/>
      <rect x="8" y="22" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".6"/>
      <rect x="22" y="22" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".3"/>
    </svg>
    <span class="splash-name">CoWork</span>
  </div>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-wrap">
    <div class="auth-logo">
      <svg width="56" height="56" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="12" fill="var(--card)"/>
        <rect x="8" y="8" width="10" height="10" rx="2.5" fill="var(--lime)"/>
        <rect x="22" y="8" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".6"/>
        <rect x="8" y="22" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".6"/>
        <rect x="22" y="22" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".3"/>
      </svg>
      <h1 class="auth-title">CoWork</h1>
      <p class="auth-sub" data-i18n="auth.tagline">팀과 함께하는 스마트 협업</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" data-i18n="auth.login">로그인</button>
      <button class="auth-tab" data-tab="register" data-i18n="auth.register">회원가입</button>
    </div>

    <!-- LOGIN -->
    <form id="login-form" class="auth-form">
      <div class="field-group">
        <label class="field-label" data-i18n="auth.id">아이디</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="login-id" class="field-input" placeholder="아이디 입력" autocomplete="username" required>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" data-i18n="auth.password">비밀번호</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="login-pw" class="field-input" placeholder="비밀번호 입력" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('login-pw',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="login-error" class="auth-error hidden"></div>
      <button type="submit" class="btn-primary btn-full" data-i18n="auth.loginBtn">로그인</button>
    </form>

    <!-- REGISTER -->
    <form id="register-form" class="auth-form hidden">
      <div class="field-group">
        <label class="field-label" data-i18n="auth.id">아이디</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <input type="text" id="reg-id" class="field-input" placeholder="영문+숫자 4~20자" autocomplete="username" required>
        </div>
        <div id="reg-id-msg" class="field-hint"></div>
      </div>
      <div class="field-group">
        <label class="field-label" data-i18n="auth.displayName">표시 이름</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="reg-name" class="field-input" placeholder="이름 입력" required>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" data-i18n="auth.password">비밀번호</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="reg-pw" class="field-input" placeholder="8자 이상" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('reg-pw',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" data-i18n="auth.confirmPw">비밀번호 확인</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="reg-pw2" class="field-input" placeholder="비밀번호 재입력" autocomplete="new-password" required>
        </div>
      </div>
      <div id="reg-error" class="auth-error hidden"></div>
      <button type="submit" class="btn-primary btn-full" data-i18n="auth.registerBtn">회원가입</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden">

  <!-- PROJECT SELECT -->
  <div id="project-screen" class="project-screen hidden">
    <div class="project-header">
      <div class="project-logo">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <rect x="8" y="8" width="10" height="10" rx="2.5" fill="var(--lime)"/>
          <rect x="22" y="8" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".6"/>
          <rect x="8" y="22" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".6"/>
          <rect x="22" y="22" width="10" height="10" rx="2.5" fill="var(--lime)" opacity=".3"/>
        </svg>
        <span>CoWork</span>
      </div>
      <div class="project-user-wrap">
        <span id="proj-username" class="proj-username"></span>
        <button class="btn-icon" onclick="App.logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="project-body">
      <h2 class="project-heading" data-i18n="project.myProjects">내 프로젝트</h2>
      <div id="project-list" class="project-list"></div>
      <button class="btn-new-project" onclick="App.showCreateProject()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span data-i18n="project.create">새 프로젝트 만들기</span>
      </button>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="app-shell hidden">
    <div class="topbar">
      <button class="btn-icon" onclick="App.backToProjects()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      <div class="topbar-title">
        <span id="current-project-name" class="topbar-project"></span>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon notif-btn" id="notif-btn" onclick="App.toggleNotifPanel()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span id="notif-dot" class="notif-dot hidden"></span>
        </button>
        <button class="btn-icon" onclick="App.goSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <div class="screens" id="screens">
      <div class="screen active" id="s-todo"></div>
      <div class="screen" id="s-memo"></div>
      <div class="screen" id="s-schedule"></div>
      <div class="screen" id="s-chat"></div>
      <div class="screen" id="s-settings"></div>
    </div>

    <nav class="bnav">
      <button class="bn active" data-screen="s-todo" onclick="App.switchTab('todo')">
        <div class="bn-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="6" height="6" rx="1"/><rect x="3" y="13" width="6" height="6" rx="1"/><line x1="13" y1="8" x2="21" y2="8"/><line x1="13" y1="16" x2="21" y2="16"/></svg>
        </div>
        <span class="bn-label" data-i18n="nav.todo">할 일</span>
      </button>
      <button class="bn" data-screen="s-memo" onclick="App.switchTab('memo')">
        <div class="bn-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
        </div>
        <span class="bn-label" data-i18n="nav.memo">메모</span>
      </button>
      <button class="bn" data-screen="s-schedule" onclick="App.switchTab('schedule')">
        <div class="bn-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <span class="bn-label" data-i18n="nav.schedule">일정</span>
      </button>
      <button class="bn" data-screen="s-chat" onclick="App.switchTab('chat')">
        <div class="bn-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        </div>
        <span class="bn-label" data-i18n="nav.chat">채팅</span>
        <span id="chat-badge" class="nav-badge hidden">0</span>
      </button>
    </nav>
  </div>

  <!-- NOTIFICATION PANEL -->
  <div id="notif-panel" class="notif-panel hidden">
    <div class="notif-header">
      <span data-i18n="notif.title">알림</span>
      <button onclick="App.clearNotifs()" class="notif-clear" data-i18n="notif.clear">모두 지우기</button>
    </div>
    <div id="notif-list" class="notif-list"></div>
  </div>
  <div id="notif-overlay" class="overlay hidden" onclick="App.toggleNotifPanel()"></div>
</div>

<!-- MODAL & TOAST -->
<div id="modal-overlay" class="overlay hidden" onclick="Modal.closeOnOverlay(event)"></div>
<div id="modal" class="modal hidden"></div>
<div id="toast-container" class="toast-container"></div>

<!-- APP SCRIPTS (순서 중요) -->
<script src="js/i18n.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/projects.js"></script>
<script src="js/todo.js"></script>
<script src="js/memo.js"></script>
<script src="js/schedule.js"></script>
<script src="js/chat.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
